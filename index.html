<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无畏助手 - 强制同步版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div id="app" class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-6 text-blue-400">🛡️ 云端战绩助手</h1>
        
        <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 mb-6">
            <div class="space-y-4">
                <input v-model="newRecord.agent" placeholder="特工名" class="w-full bg-slate-900 p-3 rounded-lg border border-slate-700 outline-none">
                <div class="grid grid-cols-2 gap-4 text-black">
                    <input v-model.number="newRecord.kills" type="number" placeholder="K" class="p-3 rounded-lg">
                    <input v-model.number="newRecord.deaths" type="number" placeholder="D" class="p-3 rounded-lg">
                </div>
                <button @click="addRecord" :disabled="loading" class="w-full bg-blue-600 py-3 rounded-lg font-bold">
                    {{ loading ? '正在强制同步...' : '保存至云端' }}
                </button>
            </div>
        </div>

        <div v-for="item in history" :key="item.id" class="bg-slate-800 p-4 rounded-xl mb-3 flex justify-between items-center border-l-4" :class="item.kills >= item.deaths ? 'border-green-500' : 'border-red-500'">
            <div>
                <div class="font-bold">{{ item.agent }}</div>
                <div class="text-[10px] text-slate-500">{{ new Date(item.created_at).toLocaleString() }}</div>
            </div>
            <div class="font-mono font-bold">{{ item.kills }} / {{ item.deaths }}</div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue
        
        // 你的最新参数
        const SUPABASE_URL = 'https://apskvttqoaajflxywla.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_xxBjAK0xc0SElMLc24Sfeg_SicJ3p16X_N8U-N8U'

        // 重点：在这里强制配置全局 Fetch 行为
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: { persistSession: false },
            global: { headers: { 'x-application-name': 'valorant-app' } }
        })

        createApp({
            setup() {
                const newRecord = ref({ agent: '', kills: 0, deaths: 0 })
                const history = ref([])
                const loading = ref(false)

                const fetchRecords = async () => {
                    try {
                        const { data } = await client.from('records').select('*').order('created_at', { ascending: false })
                        if (data) history.value = data
                    } catch (e) { console.error('获取失败'); }
                }

                const addRecord = async () => {
                    if (!newRecord.value.agent) return
                    loading.value = true
                    
                    // 使用原生 fetch 尝试绕过某些 SDK 限制
                    const { error } = await client.from('records').insert([newRecord.value])
                    
                    if (error) {
                        console.error('详细错误:', error)
                        alert('同步失败：' + error.message)
                    } else {
                        newRecord.value = { agent: '', kills: 0, deaths: 0 }
                        await fetchRecords()
                    }
                    loading.value = false
                }

                onMounted(fetchRecords)
                return { newRecord, history, addRecord, loading }
            }
        }).mount('#app')
    </script>
</body>
</html>
