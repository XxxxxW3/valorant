<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诊断模式 - 无畏助手</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div id="app" class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-6 border-b border-slate-700 pb-2">🛠️ 诊断模式</h1>
        
        <div class="bg-slate-800 p-4 rounded-xl mb-6 border border-yellow-500/50">
            <p class="text-xs text-yellow-500 mb-4 font-mono uppercase tracking-widest">Debug Console</p>
            <div class="mb-4">
                <input v-model="newRecord.agent" placeholder="特工名称" class="w-full bg-slate-700 p-2 rounded">
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4 text-black">
                <input v-model.number="newRecord.kills" type="number" placeholder="K" class="p-2 rounded">
                <input v-model.number="newRecord.deaths" type="number" placeholder="D" class="p-2 rounded">
            </div>
            <button @click="addRecord" :disabled="loading"
                    class="w-full bg-blue-600 p-2 rounded font-bold">
                {{ loading ? '正在提交诊断...' : '点击发送测试数据' }}
            </button>
        </div>

        <div class="text-sm text-slate-400 font-mono">
            <p>1. 请确保 Clash 已开启且能访问 Vercel</p>
            <p>2. 请确保 Supabase RLS 已关闭</p>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue

        // 依然使用你之前的配置
        const SUPABASE_URL = 'https://apskvttqoaajflxywla.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwc2t2dHRxb2FhamZseHl3bGEiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0MTc2MjI0NSwiZXhwIjoyMDU3MzM4MjQ1fQ.H_O5G--nLh8-mF96Gz8yMByEPrv95X_Xl-mF95-l_2o'
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        createApp({
            setup() {
                const newRecord = ref({ agent: '测试特工', kills: 10, deaths: 5 })
                const loading = ref(false)

                const addRecord = async () => {
                    loading.value = true
                    try {
                        console.log('正在向 Supabase 发送数据:', newRecord.value)
                        
                        // 核心诊断逻辑
                        const { data, error, status, statusText } = await client
                            .from('records')
                            .insert([{
                                agent: newRecord.value.agent,
                                kills: newRecord.value.kills,
                                deaths: newRecord.value.deaths
                            }])
                            .select()

                        if (error) {
                            // 弹出详细的数据库错误
                            alert(`【数据库报错】\n代码: ${error.code}\n消息: ${error.message}\n状态码: ${status}`);
                            console.error('完整错误对象:', error);
                        } else {
                            alert('🎉 保存成功！说明通道已打通。');
                        }
                    } catch (err) {
                        // 弹出网络或前端代码错误
                        alert(`【前端/网络报错】\n类型: ${err.name}\n消息: ${err.message}`);
                        console.error('详细 Catch 错误:', err);
                    } finally {
                        loading.value = false
                    }
                }

                return { newRecord, addRecord, loading }
            }
        }).mount('#app')
    </script>
</body>
</html>
